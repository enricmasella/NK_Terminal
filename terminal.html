<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NK_Terminal</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── Theme variables ── */
:root{--bg:#000;--text:#f5f5f5;--text-dim:#ddd;--text-muted:#888;--accent:#fff;--border:#222;--border-light:#333;--link:#888;--link-hover:#fff;--link-bracket:#555;--prompt:#e8e8e8;--input-caret:#fff;--scrollbar:#333;--modal-bg:#111;--modal-border:#333;--links-bg:#080808;--bottom-bg:#000}
body.theme-green{--bg:#001a00;--text:#00ff00;--text-dim:#00cc00;--text-muted:#006600;--accent:#00ff00;--border:#003300;--border-light:#005500;--link:#00aa00;--link-hover:#00ff00;--link-bracket:#006600;--prompt:#00ff00;--input-caret:#00ff00;--scrollbar:#005500;--modal-bg:#001a00;--modal-border:#003300;--links-bg:#001a00;--bottom-bg:#001a00}
body.theme-amber{--bg:#1a0f00;--text:#ffb000;--text-dim:#cc8800;--text-muted:#664400;--accent:#ffcc00;--border:#332200;--border-light:#554400;--link:#cc8800;--link-hover:#ffcc00;--link-bracket:#664400;--prompt:#ffb000;--input-caret:#ffb000;--scrollbar:#554400;--modal-bg:#1a0f00;--modal-border:#332200;--links-bg:#1a0f00;--bottom-bg:#1a0f00}
body.theme-light{--bg:#f5f5f5;--text:#1a1a1a;--text-dim:#444;--text-muted:#888;--accent:#000;--border:#ddd;--border-light:#ccc;--link:#555;--link-hover:#000;--link-bracket:#999;--prompt:#1a1a1a;--input-caret:#000;--scrollbar:#ccc;--modal-bg:#fff;--modal-border:#ddd;--links-bg:#eee;--bottom-bg:#f5f5f5}
body.theme-matrix{--bg:#000;--text:#00ff41;--text-dim:#00cc33;--text-muted:#006600;--accent:#00ff41;--border:#003300;--border-light:#005500;--link:#00aa00;--link-hover:#00ff41;--link-bracket:#005500;--prompt:#00ff41;--input-caret:#00ff41;--scrollbar:#005500;--modal-bg:#000;--modal-border:#003300;--links-bg:#000;--bottom-bg:#000}

body{background:var(--bg);color:var(--text);font-family:'Courier New',Courier,'Liberation Mono',monospace;font-size:16px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden;letter-spacing:0.3px}
body.font-fira{font-family:'Fira Code','Courier New',monospace}
body.font-jetbrains{font-family:'JetBrains Mono','Courier New',monospace}
body.font-system{font-family:system-ui,-apple-system,sans-serif}

#term{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px 8px;scroll-behavior:smooth;position:relative}
#term::-webkit-scrollbar{width:4px}
#term::-webkit-scrollbar-track{background:0 0}
#term::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.l{white-space:pre-wrap;word-break:break-word;min-height:1.35em}
.l.d{color:var(--text-dim)}
.l.p{color:var(--prompt)}
.l.r{color:var(--text)}
.l.s{color:var(--text-muted);user-select:none}
.l.h{color:var(--accent);font-weight:700;margin-top:.6em}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Gear icon (top right) ── */
#gear{position:fixed;top:10px;right:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:20px;border-radius:4px;transition:color .2s,background .2s;z-index:100;user-select:none;opacity:.5}
#gear:hover{color:var(--text);background:var(--border);opacity:1}

/* ── Settings modal ── */
#settings-overlay{position:fixed;inset:0;z-index:200;display:none;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
#settings-overlay.open{display:flex;align-items:center;justify-content:center}
#settings-card{background:var(--modal-bg);border:1px solid var(--modal-border);border-radius:12px;padding:28px 32px;width:400px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#settings-card h2{margin:0 0 20px;color:var(--accent);font-size:18px}
#settings-card .sec{margin-bottom:20px}
#settings-card .sec:last-child{margin-bottom:0}
#settings-card .sec-title{color:var(--text-muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
#settings-card label{display:flex;align-items:center;gap:8px;color:var(--text);font-size:14px;cursor:pointer;padding:4px 0}
#settings-card label:hover{color:var(--accent)}
#settings-card select,#settings-card input[type="text"]{background:var(--border);color:var(--text);border:1px solid var(--border-light);border-radius:4px;padding:4px 8px;font-family:inherit;font-size:14px;outline:0;width:100%;margin-top:4px}
#settings-card select:focus,#settings-card input[type="text"]:focus{border-color:var(--text-muted)}
#settings-card .theme-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px}
#settings-card .theme-btn{border:1px solid var(--border-light);border-radius:6px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;color:var(--text-muted);background:var(--border);transition:all .15s}
#settings-card .theme-btn:hover{border-color:var(--text-muted)}
#settings-card .theme-btn.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--modal-bg))}
#settings-card .theme-btn .swatch{display:block;width:18px;height:18px;border-radius:50%;margin:0 auto 4px;border:1px solid var(--border-light)}
#settings-card .toggles label input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}

/* Close button */
#settings-close{position:absolute;top:12px;right:16px;cursor:pointer;color:var(--text-muted);font-size:18px;transition:color .2s;background:none;border:none;font-family:inherit}
#settings-close:hover{color:var(--text)}

#links{border-top:1px solid var(--border);padding:6px 32px;display:flex;align-items:center;gap:4px 18px;flex-wrap:wrap;background:var(--links-bg);min-height:32px;font-size:14px}
#links .lk{color:var(--link);cursor:pointer;text-decoration:none;transition:color .2s;white-space:nowrap}
#links .lk::before{content:'[';color:var(--link-bracket)}
#links .lk::after{content:']';color:var(--link-bracket)}
#links .lk:hover{color:var(--link-hover)}
#links .lk[draggable="true"]{cursor:grab;user-select:none}
#links .lk.dragging{opacity:.3;transition:opacity .15s}
#links .lk.drag-over{position:relative}
#links .lk.drag-over::after{content:'';position:absolute;left:-2px;top:-2px;bottom:-2px;width:3px;background:var(--accent);border-radius:2px;animation:dragPulse .6s ease-in-out infinite alternate}
@keyframes dragPulse{from{opacity:.4}to{opacity:1}}

#links .empty{color:#444;font-style:italic;font-size:13px}
#bottom{border-top:1px solid var(--border);padding:10px 32px 16px;display:flex;align-items:center;gap:10px;background:var(--bottom-bg)}
#prompt{color:var(--prompt);font-family:inherit;font-size:18px;white-space:pre;user-select:none}
#inp{flex:1;background:0 0;border:none;outline:0;color:var(--text);font-family:inherit;font-size:18px;caret-color:var(--input-caret)}
#inp::placeholder{color:var(--text-muted)}
.l.fetching{color:var(--text-muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>
<div id="gear" title="Customize">&#9881;</div>
<div id="settings-overlay">
  <div id="settings-card" style="position:relative">
    <button id="settings-close" aria-label="Close">&times;</button>
    <h2>Customize</h2>

    <div class="sec">
      <div class="sec-title">Theme</div>
      <div class="theme-grid">
        <div class="theme-btn active" data-theme="dark"><span class="swatch" style="background:#000;border-color:#333"></span>Dark</div>
        <div class="theme-btn" data-theme="green"><span class="swatch" style="background:#001a00;border-color:#003300"></span>Green</div>
        <div class="theme-btn" data-theme="amber"><span class="swatch" style="background:#1a0f00;border-color:#332200"></span>Amber</div>
        <div class="theme-btn" data-theme="light"><span class="swatch" style="background:#f5f5f5;border-color:#ddd"></span>Light</div>
        <div class="theme-btn" data-theme="matrix"><span class="swatch" style="background:#000;border-color:#003300"></span>Matrix</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Font</div>
      <label>Family
        <select id="set-font">
          <option value="courier">Courier (default)</option>
          <option value="fira">Fira Code</option>
          <option value="jetbrains">JetBrains Mono</option>
          <option value="system">System UI</option>
        </select>
      </label>
      <label>Size
        <select id="set-size">
          <option value="14">14px</option>
          <option value="16" selected>16px</option>
          <option value="18">18px</option>
          <option value="20">20px</option>
        </select>
      </label>
    </div>

    <div class="sec">
      <div class="sec-title">Greeting</div>
      <input type="text" id="set-greeting" placeholder="Custom message (leave empty for auto)" maxlength="60">
    </div>

    <div class="sec">
      <div class="sec-title">Layout</div>
      <div class="toggles">
        <label><input type="checkbox" id="set-weather" checked> Show weather section</label>
        <label><input type="checkbox" id="set-system" checked> Show system info</label>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Time</div>
      <div class="toggles">
        <label><input type="checkbox" id="set-hour12" checked> 12-hour format</label>
      </div>
    </div>
  </div>
</div>
<div id="term"></div>
<div id="links"></div>
<div id="bottom">
<span id="prompt">$</span>
<input type="text" id="inp" placeholder="type a message..." autofocus spellcheck="false" autocomplete="off">
</div>
<script src="terminal.js"></script>
</body>
</html>
